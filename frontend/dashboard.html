<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TerraIca — Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/modules.css">
</head>
<body>
<div class="app-layout">

    <!-- ══════ NAVBAR ══════ -->
    <nav class="navbar">
        <div class="navbar__brand">
            <button class="navbar__toggle" id="sidebarToggle" title="Menú">☰</button>
            <span class="navbar__logo">TerraIca</span>
        </div>

        <!-- Role badge center -->
        <div class="navbar__center">
            <span class="role-badge" id="navRoleBadge">—</span>
        </div>

        <div class="navbar__user">
            <div class="navbar__user-menu">
                <button class="navbar__user-avatar" id="userMenuToggle">
                    <span id="userInitial">U</span>
                </button>
                <div class="navbar__dropdown" id="userDropdown">
                    <div class="navbar__dropdown-header">
                        <div class="navbar__user-name" id="userFullName">Usuario</div>
                        <small id="userEmailNav">—</small>
                    </div>
                    <div class="navbar__dropdown-divider"></div>
                    <button class="navbar__dropdown-item" id="logoutBtn">Cerrar Sesión</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- ══════ SIDEBAR ══════ -->
    <aside class="sidebar" id="sidebar">
        <!-- Profile strip -->
        <div class="sidebar__profile">
            <div class="sidebar__profile-avatar" id="sidebarAvatar">U</div>
            <div class="sidebar__profile-info">
                <span class="sidebar__profile-name" id="sidebarName">Usuario</span>
                <span class="role-badge role-badge--sm" id="sidebarRoleBadge">—</span>
            </div>
        </div>

        <nav class="sidebar__nav">
            <!-- PRINCIPAL -->
            <div class="sidebar__section-title">Principal</div>
            <ul class="sidebar__list">
                <li class="sidebar__item">
                    <a href="#dashboard" class="sidebar__link active" data-page="dashboard">
                        <span class="sidebar__icon"></span><span>Dashboard</span>
                    </a>
                </li>
            </ul>

            <!-- ADMIN ICA: Administración -->
            <div class="sidebar__section-title sidebar-section--admin">Administración</div>
            <ul class="sidebar__list sidebar-section--admin">
                <li class="sidebar__item">
                    <a href="#usuarios" class="sidebar__link" data-page="usuarios">
                        <span class="sidebar__icon"></span><span>Usuarios</span>
                    </a>
                </li>
            </ul>

            <!-- ADMIN ICA: Catálogos -->
            <div class="sidebar__section-title sidebar-section--admin">Catálogos ICA</div>
            <ul class="sidebar__list sidebar-section--admin">
                <li class="sidebar__item">
                    <a href="#departamentos" class="sidebar__link" data-page="departamentos">
                        <span class="sidebar__icon"></span><span>Departamentos</span>
                    </a>
                </li>
                <li class="sidebar__item">
                    <a href="#municipios" class="sidebar__link" data-page="municipios">
                        <span class="sidebar__icon"></span><span>Municipios</span>
                    </a>
                </li>
                <li class="sidebar__item">
                    <a href="#cultivos" class="sidebar__link" data-page="cultivos">
                        <span class="sidebar__icon"></span><span>Cultivos</span>
                    </a>
                </li>
                <li class="sidebar__item">
                    <a href="#plagas" class="sidebar__link" data-page="plagas">
                        <span class="sidebar__icon"></span><span>Catálogo de Plagas</span>
                    </a>
                </li>
            </ul>

            <!-- PRODUCTOR: Gestión de producción (Caso de uso: gestionar lugar de produccion) -->
            <div class="sidebar__section-title sidebar-section--productor">Mi Producción</div>
            <ul class="sidebar__list sidebar-section--productor">
                <li class="sidebar__item">
                    <a href="#lugares" class="sidebar__link" data-page="lugares">
                        <span class="sidebar__icon"></span><span>Lugares de Producción</span>
                    </a>
                </li>
                <li class="sidebar__item">
                    <a href="#lotes" class="sidebar__link" data-page="lotes">
                        <span class="sidebar__icon"></span><span>Lotes</span>
                    </a>
                </li>
            </ul>

            <!-- PROPIETARIO: Gestión de predios (Caso de uso: gestionar predios) -->
            <div class="sidebar__section-title sidebar-section--propietario">Mis Predios</div>
            <ul class="sidebar__list sidebar-section--propietario">
                <li class="sidebar__item">
                    <a href="#predios" class="sidebar__link" data-page="predios">
                        <span class="sidebar__icon"></span><span>Predios</span>
                    </a>
                </li>
            </ul>

            <!-- FITOSANIDAD: Todos los roles acceden a inspecciones según rol -->
            <!-- Productor: programa inspecciones | Propietario: ve sus informes -->
            <!-- AsistenteTécnico: ejecuta inspecciones | Admin: aprueba y genera informes -->
            <div class="sidebar__section-title sidebar-section--inspector">Fitosanidad</div>
            <ul class="sidebar__list sidebar-section--inspector">
                <li class="sidebar__item">
                    <a href="#inspecciones" class="sidebar__link" data-page="inspecciones">
                        <span class="sidebar__icon"></span><span>Inspecciones</span>
                    </a>
                </li>
                <li class="sidebar__item">
                    <a href="#reportes" class="sidebar__link" data-page="reportes">
                        <span class="sidebar__icon"></span><span>Reportes</span>
                    </a>
                </li>
            </ul>
        </nav>
    </aside>

    <!-- ══════ MAIN CONTENT ══════ -->
    <main class="main-content">
        <!-- MODAL GLOBAL -->
        <div class="modal-overlay" id="main-modal">
            <div class="modal">
                <div class="modal-header">
                    <h3 class="modal-title">Modal</h3>
                    <button class="modal-close">✕</button>
                </div>
                <div class="modal-body"></div>
                <div class="modal-footer">
                    <button class="btn btn-secondary btn-cancel">Cancelar</button>
                    <button class="btn btn-primary btn-save">Guardar</button>
                </div>
            </div>
        </div>

        <!-- Page content container -->
        <div id="page-content"></div>
    </main>
</div>

<!-- Scripts -->
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/territorial.js"></script>
<script src="js/pages.js"></script>

<script>
// ─── HELPERS ──────────────────────────────────────────────────────────────────

function getUser() {
    try { return JSON.parse(localStorage.getItem('user') || '{}'); } catch { return {}; }
}

function getRole() {
    const u = getUser();
    // auth.js guarda { grupos: ["ADMINISTRADOR"] } — leer el primer elemento del array
    const raw = (Array.isArray(u.grupos) ? u.grupos[0] : null)
             || u.grupo || u.rol || u.role || '';
    return raw.toUpperCase().replace(/ /g, '_');
}

function getRoleLabel(role) {
    const map = {
        ADMINISTRADOR:    'Administrador',
        PROPIETARIO:      'Propietario',
        PRODUCTOR:        'Productor',
        ASISTENTE_TECNICO:'Asistente Técnico',
        CONSULTOR:        'Consultor'
    };
    return map[role] || role || '—';
}

// ─── SIDEBAR VISIBILITY ───────────────────────────────────────────────────────

function applySidebarRoles() {
    const role = getRole();

    // Hide all role-specific sections by default
    document.querySelectorAll('.sidebar-section--admin').forEach(el => el.style.display = 'none');
    document.querySelectorAll('.sidebar-section--propietario').forEach(el => el.style.display = 'none');
    document.querySelectorAll('.sidebar-section--productor').forEach(el => el.style.display = 'none');
    document.querySelectorAll('.sidebar-section--inspector').forEach(el => el.style.display = 'none');

    if (role === 'ADMINISTRADOR') {
        document.querySelectorAll('.sidebar-section--admin').forEach(el => el.style.display = '');
        document.querySelectorAll('.sidebar-section--propietario').forEach(el => el.style.display = '');
        document.querySelectorAll('.sidebar-section--productor').forEach(el => el.style.display = '');
        document.querySelectorAll('.sidebar-section--inspector').forEach(el => el.style.display = '');
    } else if (role === 'PROPIETARIO') {
        document.querySelectorAll('.sidebar-section--propietario').forEach(el => el.style.display = '');
        document.querySelectorAll('.sidebar-section--inspector').forEach(el => el.style.display = '');
    } else if (role === 'PRODUCTOR') {
        document.querySelectorAll('.sidebar-section--productor').forEach(el => el.style.display = '');
        document.querySelectorAll('.sidebar-section--inspector').forEach(el => el.style.display = '');
    } else if (role === 'ASISTENTE_TECNICO') {
        document.querySelectorAll('.sidebar-section--inspector').forEach(el => el.style.display = '');
    } else {
        // Default: show inspections
        document.querySelectorAll('.sidebar-section--inspector').forEach(el => el.style.display = '');
    }
}

// ─── PAGE ROUTING ─────────────────────────────────────────────────────────────

const pageMap = {
    dashboard:      null, // handled separately
    usuarios:       (c) => usuariosPage.render(c),
    departamentos:  (c) => departamentosPage.render(c),
    municipios:     (c) => municipiosPage.render(c),
    lugares:        (c) => lugaresPage.render(c),
    predios:        (c) => prediosPage.render(c),
    cultivos:       (c) => cultivosPage.render(c),
    lotes:          (c) => lotesPage.render(c),
    plagas:         (c) => plagasPage.render(c),
    inspecciones:   (c) => inspeccionesPage.render(c),
    reportes:       (c) => reportesPage.render(c)
};

async function loadPage(page) {
    const container = document.getElementById('page-content');
    if (!container) return;

    // Update active link
    document.querySelectorAll('.sidebar__link').forEach(l => {
        l.classList.toggle('active', l.dataset.page === page);
    });

    if (page === 'dashboard') {
        await renderDashboard(container);
        return;
    }

    const renderer = pageMap[page];
    if (renderer) {
        container.innerHTML = `<div class="loading-screen"><div class="spinner"></div><p>Cargando ${page}...</p></div>`;
        try {
            await renderer(container);
        } catch(err) {
            console.error('Error cargando página', page, err);
            container.innerHTML = `
                <div class="error-state">
                    
                    <h3>Error al cargar ${page}</h3>
                    <p style="color:#8a94a6;margin:8px 0 20px">${err?.message || 'No se pudo conectar con el servidor'}</p>
                    <button class="btn btn-secondary" onclick="loadPage('${page}')">Reintentar</button>
                    <button class="btn btn-secondary" onclick="loadPage('dashboard')" style="margin-left:8px">← Inicio</button>
                </div>`;
        }
    } else {
        container.innerHTML = `<div class="error-state"><h3>Página no encontrada</h3></div>`;
    }
}
window.loadPage = loadPage;

// ─── DASHBOARD HOME ───────────────────────────────────────────────────────────

async function renderDashboard(container) {
    const role = getRole();
    const user = getUser();
    const nombre = user.nombre || user.name || 'Usuario';
    const hora = new Date().getHours();
    const saludo = hora < 12 ? 'Buenos días' : hora < 18 ? 'Buenas tardes' : 'Buenas noches';
    const roleCls = role.toLowerCase().replace(/_/g, '-');

    // ── Contenido según rol ──────────────────────────────────────────────────
    const statsHTML = _dashStatsHTML(role);
    const quicklinksConfig = _dashQuicklinks(role);

    container.innerHTML = `
        <div class="dashboard-welcome">
            <div class="dashboard-welcome__text">
                <h1>${saludo}, <strong>${nombre}</strong></h1>
                <p>Aquí tienes un resumen de tu actividad</p>
            </div>
            <div class="dashboard-welcome__role">
                <span class="role-badge role-badge--lg role-badge--${roleCls}">${getRoleLabel(role)}</span>
            </div>
        </div>

        ${statsHTML}

        <div class="dashboard-quicklinks">
            <h3 class="section-title">Acceso Rápido</h3>
            <div class="quicklinks-grid">
                ${quicklinksConfig.map(q => `
                    <button class="quicklink-card" onclick="loadPage('${q.page}')">
                        <span class="quicklink-card__icon">${q.icon}</span>
                        <span class="quicklink-card__label">${q.label}</span>
                    </button>`).join('')}
            </div>
        </div>

        ${role === 'ASISTENTE_TECNICO' ? `<div id="at-destinos-section"></div>` : ''}`;

    // Cargar stats async según rol
    _loadDashStats(role);

    // Panel especial para Asistente Técnico
    if (role === 'ASISTENTE_TECNICO') {
        await _renderAsistenteDashboard(document.getElementById('at-destinos-section'));
    }
}

// ── Stats HTML por rol ──────────────────────────────────────────────────────

function _dashStatsHTML(role) {
    // Stats por rol según casos de uso - InformacionImportante.docx
    if (role === 'ADMINISTRADOR') {
        return `<div class="stats-grid stats-grid--4">
            <div class="stat-card stat-card--orange"><div class="stat-card__icon"></div>
                <div class="stat-card__body"><div class="stat-card__value" id="d-pend-aprobacion">—</div><div class="stat-card__label">Pend. Aprobación</div></div></div>
            <div class="stat-card stat-card--green"><div class="stat-card__icon"></div>
                <div class="stat-card__body"><div class="stat-card__value" id="d-aprobadas">—</div><div class="stat-card__label">Aprobadas</div></div></div>
            <div class="stat-card stat-card--blue"><div class="stat-card__icon"></div>
                <div class="stat-card__body"><div class="stat-card__value" id="d-usuarios">—</div><div class="stat-card__label">Usuarios</div></div></div>
            <div class="stat-card stat-card--red"><div class="stat-card__icon"></div>
                <div class="stat-card__body"><div class="stat-card__value" id="d-plagas">—</div><div class="stat-card__label">Plagas Catálogo</div></div></div>
        </div>`;
    }
    if (role === 'PROPIETARIO') {
        return `<div class="stats-grid stats-grid--4">
            <div class="stat-card stat-card--blue"><div class="stat-card__icon"></div>
                <div class="stat-card__body"><div class="stat-card__value" id="d-predios">—</div><div class="stat-card__label">Mis Predios</div></div></div>
            <div class="stat-card stat-card--orange"><div class="stat-card__icon"></div>
                <div class="stat-card__body"><div class="stat-card__value" id="d-inspecciones">—</div><div class="stat-card__label">Inspecciones</div></div></div>
            <div class="stat-card stat-card--green"><div class="stat-card__icon"></div>
                <div class="stat-card__body"><div class="stat-card__value" id="d-completadas">—</div><div class="stat-card__label">Informes Disponibles</div></div></div>
            <div class="stat-card stat-card--red"><div class="stat-card__icon"></div>
                <div class="stat-card__body"><div class="stat-card__value" id="d-pendientes">—</div><div class="stat-card__label">Pendientes</div></div></div>
        </div>`;
    }
    if (role === 'PRODUCTOR') {
        return `<div class="stats-grid stats-grid--4">
            <div class="stat-card stat-card--green"><div class="stat-card__icon"></div>
                <div class="stat-card__body"><div class="stat-card__value" id="d-lugares">—</div><div class="stat-card__label">Lugares de Producción</div></div></div>
            <div class="stat-card stat-card--blue"><div class="stat-card__icon"></div>
                <div class="stat-card__body"><div class="stat-card__value" id="d-lotes">—</div><div class="stat-card__label">Lotes Activos</div></div></div>
            <div class="stat-card stat-card--orange"><div class="stat-card__icon"></div>
                <div class="stat-card__body"><div class="stat-card__value" id="d-inspecciones">—</div><div class="stat-card__label">Mis Inspecciones</div></div></div>
            <div class="stat-card stat-card--red"><div class="stat-card__icon"></div>
                <div class="stat-card__body"><div class="stat-card__value" id="d-pend-insp">—</div><div class="stat-card__label">Programadas</div></div></div>
        </div>`;
    }
    if (role === 'ASISTENTE_TECNICO') {
        return `<div class="stats-grid stats-grid--4">
            <div class="stat-card stat-card--orange"><div class="stat-card__icon"></div>
                <div class="stat-card__body"><div class="stat-card__value" id="d-pendientes">—</div><div class="stat-card__label">Programadas</div></div></div>
            <div class="stat-card stat-card--blue"><div class="stat-card__icon"></div>
                <div class="stat-card__body"><div class="stat-card__value" id="d-progreso">—</div><div class="stat-card__label">En Proceso</div></div></div>
            <div class="stat-card stat-card--red"><div class="stat-card__icon"></div>
                <div class="stat-card__body"><div class="stat-card__value" id="d-revision">—</div><div class="stat-card__label">Pend. Revisión</div></div></div>
            <div class="stat-card stat-card--green"><div class="stat-card__icon"></div>
                <div class="stat-card__body"><div class="stat-card__value" id="d-completadas">—</div><div class="stat-card__label">Completadas</div></div></div>
        </div>`;
    }
    return '';
}

// ── Quicklinks por rol ──────────────────────────────────────────────────────

function _dashQuicklinks(role) {
    // Quicklinks basados en casos de uso del documento InformacionImportante.docx
    if (role === 'ADMINISTRADOR') return [
        { icon:'', label:'Aprobar Inspecciones',  page:'inspecciones' },
        { icon:'', label:'Generar Informes',       page:'reportes' },
        { icon:'', label:'Gestionar Usuarios',    page:'usuarios' },
        { icon:'', label:'Cultivos y Plagas',     page:'cultivos' }
    ];
    if (role === 'PROPIETARIO') return [
        { icon:'', label:'Mis Predios',           page:'predios' },
        { icon:'', label:'Mis Informes',          page:'reportes' },
        { icon:'', label:'Ver Inspecciones',      page:'inspecciones' }
    ];
    if (role === 'PRODUCTOR') return [
        { icon:'', label:'Programar Inspección',  page:'inspecciones' },
        { icon:'', label:'Lugares de Producción', page:'lugares' },
        { icon:'', label:'Mis Lotes',             page:'lotes' }
    ];
    if (role === 'ASISTENTE_TECNICO') return [
        { icon:'', label:'Mis Inspecciones',      page:'inspecciones' },
        { icon:'', label:'Ver Reportes',          page:'reportes' }
    ];
    return [];
}

// ── Carga de stats async por rol ────────────────────────────────────────────

function _loadDashStats(role) {
    const arr = v => Array.isArray(v) ? v : (v?.data ?? v?.content ?? []);
    const set = (id, val) => { const el = document.getElementById(id); if(el) el.textContent = val; };

    if (role === 'ADMINISTRADOR') {
        // ADMIN ICA: stats de inspecciones pendientes de aprobación (caso de uso: Aprobar Inspección)
        Promise.allSettled([
            apiUsuarios.get(Endpoints.USUARIOS.LIST),
            apiInspecciones.get(Endpoints.INSPECCIONES.LIST),
            apiTerritorial.get(Endpoints.TERRITORIAL.PLAGAS.LIST)
        ]).then(([u,i,pl]) => {
            if(u.status==='fulfilled') set('d-usuarios', arr(u.value).length);
            if(pl.status==='fulfilled') set('d-plagas', arr(pl.value).length);
            if(i.status==='fulfilled') {
                const insp = arr(i.value);
                set('d-pend-aprobacion', insp.filter(x=>x.estado==='PENDIENTE_REVISION').length);
                set('d-aprobadas',       insp.filter(x=>x.estado==='COMPLETADA').length);
            }
        }).catch(()=>{});
    }
    else if (role === 'PROPIETARIO') {
        // PROPIETARIO: stats de predios e inspecciones de sus predios
        Promise.allSettled([
            apiTerritorial.get(Endpoints.TERRITORIAL.PREDIOS.LIST),
            apiInspecciones.get(Endpoints.INSPECCIONES.LIST)
        ]).then(([p,i]) => {
            if(p.status==='fulfilled') set('d-predios', arr(p.value).length);
            if(i.status==='fulfilled') {
                const insp = arr(i.value);
                set('d-inspecciones', insp.length);
                set('d-completadas',  insp.filter(x=>x.estado==='COMPLETADA').length);
                set('d-pendientes',   insp.filter(x=>x.estado==='PROGRAMADA').length);
            }
        }).catch(()=>{});
    }
    else if (role === 'PRODUCTOR') {
        // PRODUCTOR: lugares de producción + lotes + inspecciones programadas (caso de uso: Programar Inspección)
        Promise.allSettled([
            apiTerritorial.get(Endpoints.TERRITORIAL.LUGARES.LIST),
            apiTerritorial.get(Endpoints.TERRITORIAL.LOTES.LIST),
            apiInspecciones.get(Endpoints.INSPECCIONES.LIST)
        ]).then(([l,lo,i]) => {
            if(l.status==='fulfilled') set('d-lugares', arr(l.value).length);
            if(lo.status==='fulfilled') {
                set('d-lotes', arr(lo.value).filter(x=>x.estado==='EN_PRODUCCION').length);
            }
            if(i.status==='fulfilled') {
                const insp = arr(i.value);
                set('d-inspecciones', insp.length);
                set('d-pend-insp',   insp.filter(x=>x.estado==='PROGRAMADA').length);
            }
        }).catch(()=>{});
    }
    else if (role === 'ASISTENTE_TECNICO') {
        // ASISTENTE: inspecciones asignadas y estado de las mismas
        apiInspecciones.get(Endpoints.INSPECCIONES.LIST).then(res => {
            const insp = arr(res);
            set('d-pendientes',  insp.filter(x=>x.estado==='PROGRAMADA').length);
            set('d-progreso',    insp.filter(x=>x.estado==='EN_PROCESO').length);
            set('d-revision',    insp.filter(x=>x.estado==='PENDIENTE_REVISION').length);
            set('d-completadas', insp.filter(x=>x.estado==='COMPLETADA').length);
        }).catch(()=>{});
    }
}

// ── Panel de Agenda para ASISTENTE TÉCNICO (nuevo esquema) ──────────────────

async function _renderAsistenteDashboard(container) {
    if (!container) return;
    container.innerHTML = `
        <div class="at-section-header">
            <h3 class="section-title">Mi Agenda de Inspecciones</h3>
            <p class="section-subtitle">Inspecciones fitosanitarias hortifrutícolas asignadas</p>
        </div>
        <div id="at-destinos-grid" class="at-destinos-grid">
            ${[1,2,3].map(()=>`<div class="at-destino-card at-destino-card--pendiente">
                <div class="skeleton" style="height:18px;width:60%;margin-bottom:10px"></div>
                <div class="skeleton" style="height:13px;width:90%;margin-bottom:6px"></div>
                <div class="skeleton" style="height:13px;width:75%"></div>
            </div>`).join('')}
        </div>`;

    try {
        const arr = v => Array.isArray(v) ? v : (v?.data ?? v?.content ?? []);

        // Cargar TODOS los datos geográficos necesarios para la cadena de ubicación
        const [inspRes, lotesRes, lugaresRes, prediosRes, munisRes, depsRes] = await Promise.allSettled([
            apiInspecciones.get(Endpoints.INSPECCIONES.LIST),
            apiTerritorial.get(Endpoints.TERRITORIAL.LOTES.LIST),
            apiTerritorial.get(Endpoints.TERRITORIAL.LUGARES.LIST),
            apiTerritorial.get(Endpoints.TERRITORIAL.PREDIOS.LIST),
            apiTerritorial.get(Endpoints.TERRITORIAL.MUNICIPIOS.LIST),
            apiTerritorial.get(Endpoints.TERRITORIAL.DEPARTAMENTOS.LIST)
        ]);

        const todasInsps = arr(inspRes.status === 'fulfilled' ? inspRes.value : []);
        const lotes      = arr(lotesRes.status === 'fulfilled' ? lotesRes.value : []);
        const lugares    = arr(lugaresRes.status === 'fulfilled' ? lugaresRes.value : []);
        const predios    = arr(prediosRes.status === 'fulfilled' ? prediosRes.value : []);
        const munis      = arr(munisRes.status === 'fulfilled' ? munisRes.value : []);
        const deps       = arr(depsRes.status === 'fulfilled' ? depsRes.value : []);

        // Filtrar solo las inspecciones activas (nuevo esquema: PROGRAMADA + EN_PROCESO + COMPLETADA)
        const inspecciones = todasInsps.filter(i =>
            ['PROGRAMADA', 'EN_PROCESO', 'COMPLETADA'].includes(i.estado)
        );

        const grid = document.getElementById('at-destinos-grid');
        if (!grid) return;

        if (!inspecciones.length) {
            grid.innerHTML = `
                <div class="at-no-destinos">
                    
                    <h4>Sin inspecciones pendientes</h4>
                    <p>El Administrador ICA no ha asignado inspecciones por el momento</p>
                    <button class="btn btn-primary" onclick="loadPage('inspecciones')">Ver agenda completa</button>
                </div>`;
            return;
        }

        // Para cada inspección, construir la CADENA COMPLETA DE UBICACIÓN:
        // Inspección → Detalle → Lote → Lugar de Producción → Predio → Municipio → Departamento
        const enriquecidas = await Promise.all(inspecciones.slice(0, 6).map(async insp => {
            const id = insp.idInspeccion || insp.id;
            let loteInfo   = null;
            let lugarInfo  = null;
            let predioInfo = null;
            let muniInfo   = null;
            let depInfo    = null;

            try {
                // Paso 1: Buscar detalles para obtener idLote (nuevo esquema)
                const dets = await apiInspecciones.get(
                    Endpoints.INSPECCIONES.DETALLES.LIST(id)
                ).catch(() => []);
                const detalles = Array.isArray(dets) ? dets : [];
                const primerDet = detalles[0];

                if (primerDet?.idLote) {
                    // Paso 2: Lote → Cultivo + Lugar de Producción
                    loteInfo = lotes.find(l => l.id === primerDet.idLote) || null;

                    if (loteInfo?.idLugar) {
                        // Paso 3: Lugar de Producción
                        lugarInfo = lugares.find(lg => lg.id === loteInfo.idLugar) || null;

                        // Paso 4: Predio (busca el predio que referencia este lugar)
                        predioInfo = predios.find(p =>
                            p.lugarProduccionId === loteInfo.idLugar ||
                            p.lugarProduccion?.id === loteInfo.idLugar
                        ) || null;

                        if (predioInfo?.municipioId) {
                            // Paso 5: Municipio
                            muniInfo = munis.find(m => m.id === predioInfo.municipioId) || null;

                            if (muniInfo?.departamentoId) {
                                // Paso 6: Departamento
                                depInfo = deps.find(d => d.id === muniInfo.departamentoId) || null;
                            }
                        }
                    }
                }
            } catch(e) { console.warn('Error enriqueciendo inspección', id, e); }

            return { insp, loteInfo, lugarInfo, predioInfo, muniInfo, depInfo };
        }));

        // Renderizar tarjetas mejoradas
        const estadoColorMap = {
            EN_PROCESO: 'at-destino-card--progreso',
            COMPLETADA: 'at-destino-card--progreso',
            PROGRAMADA: 'at-destino-card--pendiente'
        };
        const estadoBadgeMap = {
            EN_PROCESO: `<span class="badge badge--info">En Proceso</span>`,
            COMPLETADA: `<span class="badge badge--success">Completada</span>`,
            PROGRAMADA: `<span class="badge badge--warning">Programada</span>`
        };
        const accionBtnMap = {
            EN_PROCESO: `<button class="btn btn-primary btn-sm" onclick="event.stopPropagation(); loadPage('inspecciones')">Ir a Conteo de Plantas</button>`,
            COMPLETADA: `<button class="btn btn-secondary btn-sm" onclick="event.stopPropagation(); loadPage('inspecciones')">Enviar a Admin ICA</button>`,
            PROGRAMADA: `<button class="btn btn-secondary btn-sm" onclick="event.stopPropagation(); loadPage('inspecciones')">Comenzar Inspección</button>`
        };

        grid.innerHTML = enriquecidas.map(({ insp, loteInfo, lugarInfo, predioInfo, muniInfo, depInfo }) => {
            const estado     = insp.estado || 'PROGRAMADA';
            const colorClass = estadoColorMap[estado] || 'at-destino-card--pendiente';
            const badge      = estadoBadgeMap[estado] || estadoBadgeMap.PROGRAMADA;
            const accion     = accionBtnMap[estado] || accionBtnMap.PROGRAMADA;
            const fecha      = insp.fechaInspeccion
                ? new Date(insp.fechaInspeccion + 'T00:00:00').toLocaleDateString('es-CO', { weekday:'long', day:'numeric', month:'long' })
                : '—';
            const codigo = insp.numeroInspeccion || insp.codigoIca || ('#' + (insp.idInspeccion || insp.id));
            const tipo   = insp.tipo || insp.tipoInspeccion || 'Rutinaria';
            const tieneUbicacion = loteInfo || lugarInfo || predioInfo || muniInfo || depInfo;

            return `
            <div class="at-destino-card ${colorClass}">
                <!-- Encabezado: estado y fecha -->
                <div class="at-destino-card__top">
                    <div>${badge}</div>
                    <div class="at-destino-card__fecha">${fecha}</div>
                </div>
                <div style="font-size:0.72rem;color:#8a94a6;margin:2px 0 8px;font-family:monospace">
                    ${codigo} · ${tipo}
                </div>

                <!-- Cultivo / Lote -->
                <div class="at-destino-card__cultivo">
                    <span class="crop-dot"></span>
                    ${loteInfo
                        ? `<strong>${loteInfo.nombre||'Lote'}</strong>
                           <span class="text-muted" style="font-size:0.78rem"> — ${loteInfo.cultivoNombre||'Cultivo hortifrutícola'}</span>`
                        : `<strong>${tipo} Fitosanitaria</strong>
                           <span class="text-muted" style="font-size:0.78rem"> — sin lote asignado aún</span>`
                    }
                </div>

                <!-- ══ CADENA DE UBICACIÓN COMPLETA ══ -->
                <div class="at-destino-card__localizacion">
                    ${depInfo ? `
                    <div class="at-loc-row">
                        <span class="at-loc-icon">Dep.:</span>
                        <div class="at-loc-info">
                            <span class="at-loc-label">Departamento</span>
                            <span class="at-loc-value">${depInfo.nombre}</span>
                        </div>
                    </div>` : ''}

                    ${muniInfo ? `
                    <div class="at-loc-row">
                        <span class="at-loc-icon">Mun.:</span>
                        <div class="at-loc-info">
                            <span class="at-loc-label">Municipio</span>
                            <span class="at-loc-value">${muniInfo.nombre}</span>
                        </div>
                    </div>` : ''}

                    ${predioInfo?.vereda ? `
                    <div class="at-loc-row">
                        <span class="at-loc-icon">Vereda:</span>
                        <div class="at-loc-info">
                            <span class="at-loc-label">Vereda</span>
                            <span class="at-loc-value">${predioInfo.vereda}</span>
                        </div>
                    </div>` : ''}

                    ${lugarInfo ? `
                    <div class="at-loc-row">
                        <span class="at-loc-icon">Lugar:</span>
                        <div class="at-loc-info">
                            <span class="at-loc-label">Lugar de Producción</span>
                            <span class="at-loc-value">${lugarInfo.nombre}${lugarInfo.area ? ' · '+lugarInfo.area+' ha' : ''}</span>
                        </div>
                    </div>` : ''}

                    ${predioInfo ? `
                    <div class="at-loc-row">
                        <span class="at-loc-icon">Predio:</span>
                        <div class="at-loc-info">
                            <span class="at-loc-label">Predio · N° Predial</span>
                            <span class="at-loc-value">${predioInfo.nombre}${predioInfo.numeroPredial ? ' · <code>'+predioInfo.numeroPredial+'</code>' : ''}</span>
                        </div>
                    </div>` : ''}

                    ${loteInfo?.fechaSiembra ? `
                    <div class="at-loc-row">
                        <span class="at-loc-icon">Cultivo:</span>
                        <div class="at-loc-info">
                            <span class="at-loc-label">Cultivo · Fecha Siembra</span>
                            <span class="at-loc-value">${loteInfo.cultivoNombre||'—'} · ${new Date(loteInfo.fechaSiembra+'T00:00:00').toLocaleDateString('es-CO')}</span>
                        </div>
                    </div>` : ''}

                    ${!tieneUbicacion ? `
                    <div class="at-loc-row" style="background:#fff8e1;border-color:#ffa726">
                        <span class="at-loc-icon">Ubi.:</span>
                        <div class="at-loc-info">
                            <span class="at-loc-label">Ubicación</span>
                            <span class="at-loc-value" style="color:#e65100">Registre el conteo para ver la ubicación</span>
                        </div>
                    </div>` : ''}
                </div>

                <div class="at-destino-card__footer">
                    ${accion}
                </div>
            </div>`;
        }).join('');

    } catch(e) {
        const grid = document.getElementById('at-destinos-grid');
        if (grid) grid.innerHTML = `<div class="error-state"><p>No se pudo cargar la agenda: ${e.message}</p><button class="btn btn-secondary btn-sm" onclick="loadPage('inspecciones')">Ir a Inspecciones</button></div>`;
    }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', () => {
    // Auth check
    const token = localStorage.getItem('authToken');
    if (!token) { window.location.href = 'login.html'; return; }

    const user = getUser();
    const role = getRole();

    // Populate navbar & sidebar
    const nombre = user.nombre || user.name || 'Usuario';
    const initial = nombre.charAt(0).toUpperCase();
    const roleLabel = getRoleLabel(role);
    const roleCls = 'role-badge--' + role.toLowerCase().replace(/_/g, '-');

    document.getElementById('userInitial').textContent = initial;
    document.getElementById('userFullName').textContent = nombre;
    document.getElementById('userEmailNav').textContent = user.correo || user.email || '';
    document.getElementById('sidebarAvatar').textContent = initial;
    document.getElementById('sidebarName').textContent = nombre;

    ['navRoleBadge', 'sidebarRoleBadge'].forEach(id => {
        const el = document.getElementById(id);
        if (el) { el.textContent = roleLabel; el.className = `role-badge ${roleCls}`; }
    });

    // Apply role-based sidebar
    applySidebarRoles();

    // Sidebar toggle (mobile: toggle 'open', desktop: toggle 'collapsed')
    document.getElementById('sidebarToggle')?.addEventListener('click', () => {
        const sidebar = document.getElementById('sidebar');
        if (window.innerWidth <= 768) {
            sidebar?.classList.toggle('open');
        } else {
            sidebar?.classList.toggle('collapsed');
            document.querySelector('.app-layout')?.classList.toggle('sidebar-collapsed');
        }
    });

    // User dropdown
    document.getElementById('userMenuToggle')?.addEventListener('click', () => {
        document.getElementById('userDropdown')?.classList.toggle('active');
    });
    document.addEventListener('click', e => {
        if (!e.target.closest('.navbar__user-menu')) {
            document.getElementById('userDropdown')?.classList.remove('active');
        }
    });

    // Logout
    document.getElementById('logoutBtn')?.addEventListener('click', () => {
        localStorage.removeItem('authToken');
        localStorage.removeItem('user');
        window.location.href = 'login.html';
    });

    // Sidebar navigation
    document.querySelectorAll('.sidebar__link').forEach(link => {
        link.addEventListener('click', e => {
            e.preventDefault();
            const page = link.dataset.page;
            window.location.hash = page;
            loadPage(page);
        });
    });

    // Hash routing
    window.addEventListener('hashchange', () => {
        const page = window.location.hash.slice(1) || 'dashboard';
        loadPage(page);
    });

    // Initial load
    const initPage = window.location.hash.slice(1) || 'dashboard';
    loadPage(initPage);
});
</script>
</body>
</html>
